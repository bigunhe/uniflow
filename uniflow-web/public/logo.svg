<svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B5FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="10" y="10" width="80" height="80" rx="20" ry="20" fill="url(#logoGradient)" />
  <!-- Graduation cap icon -->
  <g transform="translate(50, 50)">
    <!-- Mortarboard top -->
    <path d="M -20 -8 L 0 -15 L 20 -8 L 20 -5 L -20 -5 Z" fill="white" />
    <!-- Mortarboard base -->
    <rect x="-22" y="-5" width="44" height="3" fill="white" />
    <!-- Tassel -->
    <line x1="0" y1="-5" x2="0" y2="5" stroke="white" stroke-width="2" />
    <!-- Tassel ball -->
    <circle cx="0" cy="6" r="2" fill="white" />
  </g>
</svg>
